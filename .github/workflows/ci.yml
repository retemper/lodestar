name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Skip CI if only docs/non-code files changed
  changed:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_skip: ${{ steps.changed-files.outputs.only_changed == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        id: changed-files
        with:
          files: |
            **.md
            LICENSE
            .editorconfig
            .github/ISSUE_TEMPLATE/**
            .github/pull_request_template.md

  lint:
    needs: changed
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - run: pnpm turbo lint

      - run: pnpm format:check

      - run: pnpm turbo type-check

      - run: pnpm turbo lodestar

  test:
    needs: changed
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22]
        include:
          - os: macos-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - run: pnpm turbo test -- --coverage

  # Native backend CI (Rust + Go)
  native:
    needs: changed
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.22'

      - name: Rust — test, lint, format
        working-directory: packages/accel-rust
        run: |
          cargo test
          cargo clippy -- -D warnings
          cargo fmt --check

      - name: Go — test
        working-directory: packages/accel-go
        run: go test ./internal/...

      - name: Rust — build native binary
        working-directory: packages/accel-rust
        run: cargo build --release

      - name: Go — build WASM binary
        working-directory: packages/accel-go
        run: |
          mkdir -p wasm
          GOOS=js GOARCH=wasm go build -o wasm/lodestar_native.wasm ./cmd/wasm/

  # Gate job for branch protection
  ci-passed:
    if: always()
    needs: [lint, test, native]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" && "${{ needs.lint.result }}" != "skipped" ]] || \
             [[ "${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "skipped" ]] || \
             [[ "${{ needs.native.result }}" != "success" && "${{ needs.native.result }}" != "skipped" ]]; then
            echo "CI failed (lint=${{ needs.lint.result }}, test=${{ needs.test.result }}, native=${{ needs.native.result }})"
            exit 1
          fi
          echo "CI passed"
